<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vuthy Cheam</title>
<style>
  :root{
    --paper:#FFFFFF; --ink:#17181C; --accent:#B4371F;
    --sans:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  html,body{ height:100%; margin:0; }
  body{
    background:var(--paper); color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2rem; font-family:var(--sans);
  }
  h1{
    font-family:var(--sans);
    font-weight:400;
    font-size:clamp(2.5rem,7vw,4.5rem);
    margin:0;
  }
  a.btn{
    text-decoration:none;
    font-size:0.85rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:0.9em 1.6em;
    border:1px solid var(--ink);
    color:var(--ink);
    transition:background 0.15s, color 0.15s;
  }
  a.btn:hover{ background:var(--accent); border-color:var(--accent); color:var(--paper); }
</style>
</head>
<body>
  <h1>Vuthy Cheam</h1>
  <a class="btn" href="work/jewelry.html">Jewelry Design</a>
</body>
</html>
