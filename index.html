<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vuthy Cheam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F0E9; --ink:#17181C; --accent:#B4371F;
  }
  html,body{ height:100%; margin:0; }
  body{
    background:var(--paper); color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2rem; font-family:'IBM Plex Mono', monospace;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(2.5rem,7vw,4.5rem);
    margin:0;
  }
  a.btn{
    text-decoration:none;
    font-size:0.85rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:0.9em 1.6em;
    border:1px solid var(--ink);
    color:var(--ink);
    transition:background 0.15s, color 0.15s;
  }
  a.btn:hover{ background:var(--accent); border-color:var(--accent); color:var(--paper); }
</style>
</head>
<body>
  <h1>Vuthy Cheam</h1>
  <a class="btn" href="work/jewelry.html">Jewelry Design</a>
</body>
</html>
