<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vuthy Cheam</title>
<style>
  :root{
    --paper:#FFFFFF; --ink:#17181C; --accent:#B4371F;
    --sans:ui-monospace, 'SF Mono', 'JetBrains Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;
    --header-h: 3.25rem;
  }
  *{ box-sizing:border-box; cursor:none; }
  html,body{ margin:0; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--sans);
    font-weight:300;
  }
  header{
    position:sticky; top:0; z-index:10;
    min-height:var(--header-h);
    display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:0.6rem 2rem;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(23,24,28,0.1);
  }
  header a{ color:var(--ink); text-decoration:none; }
  .home-link{
    font-family:var(--sans);
    font-weight:400;
    font-size:0.8rem;
    letter-spacing:0.02em;
    justify-self:start;
  }
  .time-badge{
    justify-self:end;
    display:inline-flex; align-items:center; gap:0.5rem;
    background:#0C1F3F; color:#fff;
    padding:0.35rem 0.9rem;
    border-radius:999px;
    font-family:var(--sans);
    font-size:0.65rem;
    font-weight:500;
    letter-spacing:0.03em;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .time-badge .dot{
    width:6px; height:6px; border-radius:50%;
    background:#fff;
    flex-shrink:0;
    animation:blink-dot 1.4s ease-in-out infinite;
  }
  @keyframes blink-dot{
    0%, 100%{ background:#fff; }
    50%{ background:#0C1F3F; }
  }
  nav{ grid-column:2; display:flex; gap:2.5rem; font-size:0.7rem; font-weight:200; letter-spacing:0.03em; text-transform:uppercase; }
  nav a{ opacity:0.6; transition:opacity 0.15s; }
  nav a:hover, nav a.current{ opacity:1; }
  nav a::before{ content:'['; opacity:0; transition:opacity 0.15s; }
  nav a::after{ content:']'; opacity:0; transition:opacity 0.15s; }
  nav a:hover::before, nav a:hover::after{ opacity:1; }

  .cursor-box{
    position:fixed;
    top:0; left:0;
    width:12px; height:12px;
    background:#fff;
    mix-blend-mode:difference;
    border-radius:50%;
    pointer-events:none;
    z-index:9998;
    transform:translate(-50%, -50%);
  }

  .hero{
    min-height:calc(100vh - var(--header-h));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2rem;
  }
  .name-block{ text-align:center; }
  .name-block h1{
    font-family:var(--sans);
    font-weight:900;
    text-transform:uppercase;
    font-size:clamp(2.2rem, 7vw, 5rem);
    line-height:1.1;
    letter-spacing:-0.01em;
    color:var(--ink);
    margin:0;
  }
  a.btn{
    text-decoration:none;
    font-size:0.7rem;
    font-weight:300;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:0.9em 1.6em;
    border:1px solid var(--ink);
    color:var(--ink);
    transition:background 0.15s, color 0.15s;
  }
  a.btn:hover{ background:var(--accent); border-color:var(--accent); color:var(--paper); }

  .contact{
    background:#232323; color:var(--paper);
    border-top:1px solid rgba(255,255,255,0.2);
    padding:4rem 2rem;
  }
  .contact-inner{ max-width:700px; margin:0; }
  .contact h2{
    font-family:var(--sans);
    font-weight:400;
    text-transform:uppercase;
    font-size:clamp(1.2rem, 2.8vw, 1.9rem);
    letter-spacing:0.01em;
    margin:0 0 1.25rem;
  }
  .contact-links{
    display:flex; flex-wrap:wrap; gap:1.25rem;
  }
  .contact-links a{
    color:var(--paper);
    text-decoration:none;
    font-size:0.65rem;
    font-weight:300;
    letter-spacing:0.05em;
    text-transform:uppercase;
    opacity:0.7;
    transition:opacity 0.15s;
  }
  .contact-links a:hover{ opacity:1; }

  @media (max-width:600px){
    .contact{ padding:3rem 1.25rem; }
  }

  .reveal{
    opacity:0;
    transform:translateY(22px);
    transition:opacity 0.9s cubic-bezier(.16,1,.3,1),
               transform 0.9s cubic-bezier(.16,1,.3,1);
    will-change:opacity, transform;
  }
  body.loaded .reveal{
    opacity:1;
    transform:translateY(0);
  }
  .reveal-1{ transition-delay:40ms; }
  .reveal-2{ transition-delay:120ms; }
  .reveal-3{ transition-delay:260ms; }
  .reveal-4{ transition-delay:380ms; }
  .reveal-5{ transition-delay:460ms; }

  .loader{
    position:fixed; inset:0; z-index:9999;
    pointer-events:none;
  }
  .loader-rows{
    position:absolute; inset:0;
    display:flex; flex-direction:row;
  }
  .loader-rows span{
    flex:1;
    background:#000;
    transform:translateY(0%);
    transition:transform 0.9s cubic-bezier(.16,1,.3,1);
  }
  .loader-rows span:nth-child(1){ transition-delay:0ms; }
  .loader-rows span:nth-child(2){ transition-delay:90ms; }
  .loader-rows span:nth-child(3){ transition-delay:180ms; }
  .loader-rows span:nth-child(4){ transition-delay:270ms; }
  .loader-rows span:nth-child(5){ transition-delay:360ms; }
  .loader-rows span:nth-child(6){ transition-delay:450ms; }
  .loader.is-done .loader-rows span{ transform:translateY(-100%); }

  .loader-counter{
    position:absolute; top:50%; left:50%;
    transform:translate(-50%, -50%);
    font-family:var(--sans);
    font-size:0.85rem;
    letter-spacing:0.04em;
    font-variant-numeric:tabular-nums;
    color:#fff;
    transition:opacity 0.3s ease;
  }
  .loader.is-done .loader-counter{ opacity:0; }

  body.is-loading{ overflow:hidden; }
</style>
</head>
<body class="is-loading">

  <div class="cursor-box"></div>

  <div class="loader" id="loader">
    <div class="loader-rows">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="loader-counter" id="loader-counter">0</div>
  </div>

  <header>
    <a class="home-link reveal reveal-1" href="index.html">[VUTHY CHEAM]</a>
    <nav class="reveal reveal-2">
      <a href="index.html">Home</a>
      <a href="#projects">Projects</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="#">Showreel</a>
    </nav>
    <span class="time-badge reveal reveal-1">
      <span id="bkk-time">BKK[TH] --:--</span>
      <span class="dot"></span>
    </span>
  </header>

  <section class="hero" id="projects">
    <div class="name-block reveal reveal-3">
      <h1 lang="en">Vuthy Cheam</h1>
      <h1 lang="km">ជាម វុឌ្ឍី</h1>
      <h1 lang="th">เฟิร์ส</h1>
    </div>
  </section>

  <footer class="contact" id="contact">
    <div class="contact-inner">
      <h2>Get In Touch</h2>
      <div class="contact-links">
        <a href="#">Email</a>
        <a href="#">LinkedIn</a>
        <a href="#">GitHub</a>
        <a href="#">Instagram</a>
        <a href="#">Threads</a>
        <a href="#">X (Twitter)</a>
        <a href="#">Facebook</a>
      </div>
    </div>
  </footer>

  <script>
    (function(){
      const timeEl = document.getElementById('bkk-time');
      function updateClock(){
        const formatted = new Intl.DateTimeFormat('en-US', {
          timeZone: 'Asia/Bangkok',
          hour: 'numeric',
          minute: '2-digit',
          second: '2-digit',
          hour12: true
        }).format(new Date());
        timeEl.textContent = 'BKK[TH] ' + formatted;
      }
      updateClock();
      setInterval(updateClock, 1000);
    })();

    (function(){
      const loader = document.getElementById('loader');
      const counter = document.getElementById('loader-counter');
      const duration = 1400;
      const start = performance.now();

      function tick(now){
        const elapsed = now - start;
        const pct = Math.min(100, Math.round((elapsed / duration) * 100));
        counter.textContent = pct;
        if (pct < 100) {
          requestAnimationFrame(tick);
        } else {
          loader.classList.add('is-done');
          document.body.classList.remove('is-loading');
          document.body.classList.add('loaded');
          setTimeout(() => { loader.style.display = 'none'; }, 1400);
        }
      }
      requestAnimationFrame(tick);
    })();

    (function(){
      const box = document.querySelector('.cursor-box');
      document.addEventListener('mousemove', (e) => {
        box.style.left = e.clientX + 'px';
        box.style.top = e.clientY + 'px';
      });
    })();
  </script>
</body>
</html>
