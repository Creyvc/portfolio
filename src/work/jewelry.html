<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewelry — Vuthy Cheam</title>
<link rel="icon" type="image/png" href="../../assets/icons/favicon.png?v=7">
<style>
  :root{
    --paper:#F3F2FA; --ink:#17181C; --accent:#B4371F;
    --sans:ui-monospace, 'SF Mono', 'JetBrains Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;
    --header-h: 3.25rem;
  }
  *{ box-sizing:border-box; cursor:none; }
  html{ scroll-behavior:smooth; }
  html,body{ margin:0; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--sans);
    font-weight:300;
  }
  .cursor-box{
    position:fixed;
    top:0; left:0;
    width:12px; height:12px;
    background:#fff;
    mix-blend-mode:difference;
    border-radius:50%;
    pointer-events:none;
    z-index:9998;
    transform:translate(-50%, -50%);
  }

  header{
    position:sticky; top:0; z-index:10;
    min-height:var(--header-h);
    display:flex; justify-content:space-between; align-items:center;
    padding:0.6rem 2rem;
    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(23,24,28,0.1);
  }
  header a{ color:var(--ink); text-decoration:none; }
  .home-link{
    font-family:var(--sans);
    font-weight:400;
    font-size:0.8rem;
    letter-spacing:0.02em;
  }
  nav{ display:flex; gap:2.5rem; font-size:0.7rem; font-weight:200; letter-spacing:0.03em; text-transform:uppercase; }
  nav a{ opacity:0.6; transition:opacity 0.15s; }
  nav a:hover, nav a.current{ opacity:1; }
  nav a::before{ content:'['; opacity:0; transition:opacity 0.15s; }
  nav a::after{ content:']'; opacity:0; transition:opacity 0.15s; }
  nav a:hover::before, nav a:hover::after{ opacity:1; }

.category-nav{
  position:sticky; top:var(--header-h); z-index:9;
  display:flex; gap:2rem;
  padding:1rem 2rem;
  background:rgba(255,255,255,0.22);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(23,24,28,0.1);
  overflow-x:auto;
  white-space:nowrap;
  scrollbar-width:none;
  scroll-margin-top:var(--header-h);
}
.category-nav::-webkit-scrollbar{ display:none; }
  .category-nav button{
    font-family:var(--sans);
    color:var(--ink);
    background:none;
    border:none;
    padding:0;
    cursor:pointer;
    text-decoration:none;
    font-size:0.8rem;
    font-weight:300;
    opacity:0.65;
    transition:opacity 0.15s;
  }
  .category-nav button:hover{ opacity:1; }
  .category-nav button.active{ opacity:1; font-weight:400; }
  .category-nav button::before{ content:'['; opacity:0; transition:opacity 0.15s; }
  .category-nav button::after{ content:']'; opacity:0; transition:opacity 0.15s; }
  .category-nav button:hover::before, .category-nav button:hover::after{ opacity:1; }

  .intro{
    position:relative;
    overflow:hidden;
    width:100%;
    min-height:calc(90vh + var(--header-h));
    margin-top:calc(-1 * var(--header-h));
    display:flex;
    align-items:flex-end;
    padding:5rem 2rem 3rem;
  }
  .intro-content{
    position:relative;
    z-index:2;
    max-width:760px;
  }
  .intro-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; z-index:0;
  }
  .intro-overlay{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
    z-index:1;
  }
  .intro-content{ position:relative; z-index:2; }
  .intro-content h1{
    color:#fff;
    font-weight:200;
    font-size:clamp(2.1rem, 5.5vw, 4.2rem);
    line-height:1.05;
    letter-spacing:-0.01em;
    margin:0;
  }
  .intro-content p{
    color:rgba(255,255,255,0.85);
    font-size:0.8rem;
    font-weight:200;
    line-height:1.7;
    max-width:56ch;
    margin:1.25rem 0 0;
  }
  .intro-content .scroll-arrow{
    display:inline-block;
    margin-top:1.5rem;
    font-size:1.5rem;
    line-height:1;
    color:#fff;
    text-decoration:none;
    opacity:0.8;
    transition:opacity 0.15s;
  }
  .intro-content .scroll-arrow:hover{ opacity:1; }
  .scroll-arrow-wrap{
    position:relative;
    display:inline-block;
    width:1.5rem; height:2.1rem;
    overflow:hidden;
    vertical-align:middle;
  }
  .scroll-arrow-stack{
    display:flex; flex-direction:column;
    transform:translateY(0);
    transition:transform 0.4s ease;
  }
  .scroll-arrow:hover .scroll-arrow-stack{ transform:translateY(-2.1rem); }
  .scroll-arrow-stack .arrow{
    height:2.1rem;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .scroll-arrow-stack svg{
    width:1.5rem; height:2.1rem;
    stroke:currentColor;
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .category{ padding-top:0; scroll-margin-top:8rem; }

  .grid{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:1px;
    background:rgba(23,24,28,0.1);
    border-top:1px solid rgba(23,24,28,0.1);
    border-bottom:1px solid rgba(23,24,28,0.1);
  }

  .piece{
    position:relative;
    background:var(--paper);
    aspect-ratio:4/5;
    display:flex; align-items:flex-end;
    overflow:hidden;
  }
  .piece .art{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    padding:1.5rem;
    background:rgba(23,24,28,0.03);
    transition:opacity 0.35s ease;
  }
  .piece .art-photo{ padding:0; background:var(--paper); }
  .piece .art-photo img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:45% 55%;
  }
  .piece .art-photo img.zoom-out{
    object-fit:contain;
    object-position:center center;
    transform:scale(1.15);
  }
  .piece .art-photo img.zoom-out-1{
    transform:scale(0.9);
  }
  .piece .art-photo img.zoom-in-3{
    transform:scale(1.15) translateX(3.5%);
  }
  .piece .art-photo img.zoom-in-5{
    transform:scale(1.9) translateX(5%);
  }
  .piece .art-photo img.zoom-in-4{
    object-position:center center;
    transform:scale(1.7) translateX(6.5%);
  }
  .piece .art-photo img.zoom-in-6{
    transform:scale(1.65) translateX(1.5%);
  }
  .piece .art-photo img.zoom-in-7{
    transform:scale(1.5) translateX(1.5%);
  }
  .piece .art-photo img.zoom-in-8{
    transform:scale(1.9) translateX(1.5%);
  }
  .piece .art-photo img.zoom-in-9{
    transform:scale(1.9) translateX(2.5%);
  }
  .piece .art-video-zoom{ transform:scale(1.6) translate(-18%, -8%); }
  .piece .art-video-zoom2{ transform:scale(1.2); }
  .piece .art-video-zoom3{ transform:scale(1); }
  .piece .art-video-zoom4{ transform:scale(1.4); }
  .piece .art-video-zoom5{ transform:scale(1.4); }
  .piece .art-video-zoom6{ transform:scale(1.7); }
  .piece .art-video-zoom7{ transform:scale(1); }
  .piece .art-video-zoom8{ transform:scale(1.4); }
  .piece .art-video-zoom9{ transform:scale(1); }
  .piece .art-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 0.35s ease;
  }
  .piece::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.45));
    opacity:0;
    transition:opacity 0.35s ease;
    pointer-events:none;
  }
  .piece:hover .art{ opacity:0; }
  .piece:hover .art-video{ opacity:1; }
  .piece:hover::after{ opacity:1; }
  .piece .art svg{
    width:100%; height:100%;
    fill:none;
    stroke-width:1.2;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke:var(--ink);
  }
  .piece .caption{
    display:none;
    position:relative;
    padding:1.25rem;
    justify-content:space-between; width:100%;
    font-size:0.6rem;
    font-weight:300;
    letter-spacing:0.02em;
    color:var(--ink);
    transition:color 0.35s ease;
  }
  .piece:hover .caption{ color:#fff; }
  .piece .caption .year{ opacity:0.5; }

  footer{
    display:flex; justify-content:center;
    padding:3rem 2rem 4rem;
  }
  .top-btn{
    display:flex; align-items:center; justify-content:center;
    width:3rem; height:3rem;
    background:none;
    cursor:pointer;
    border:none;
    color:var(--ink);
    transition:color 0.15s;
  }
  .top-btn-wrap{
    position:relative;
    display:inline-block;
    width:1.8rem; height:1.8rem;
    overflow:hidden;
  }
  .top-btn-stack{
    display:flex; flex-direction:column;
    transform:translateY(0);
    transition:transform 0.4s ease;
  }
  .top-btn:hover .top-btn-stack{ transform:translateY(-1.8rem); }
  .top-btn svg{
    width:1.8rem; height:1.8rem;
    flex-shrink:0;
    stroke:currentColor;
    fill:none;
    stroke-width:1.5;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .top-btn:hover{ color:var(--accent); }

  @media (max-width:600px){
    header{ padding:1.25rem 1.25rem; }
    nav{ gap:1rem; }
    .intro{ padding:3rem 1.25rem 2rem; }
    footer{ padding:2rem 1.25rem 3rem; }
  }

  .loader{
    position:fixed; inset:0; z-index:9999;
    pointer-events:none;
    display:none;
  }
  .loader.is-active{ display:block; }
  .loader-rows{
    position:absolute; inset:0;
    display:flex; flex-direction:row;
  }
  .loader-rows span{
    flex:1;
    background:#FF5733;
    transform:translateY(-100%);
    transition:transform 0.4s cubic-bezier(.16,1,.3,1);
  }
  .loader-rows span:nth-child(1){ transition-delay:0ms; }
  .loader-rows span:nth-child(2){ transition-delay:35ms; }
  .loader-rows span:nth-child(3){ transition-delay:70ms; }
  .loader-rows span:nth-child(4){ transition-delay:120ms; }
  .loader-rows span:nth-child(5){ transition-delay:105ms; }
  .loader-rows span:nth-child(6){ transition-delay:175ms; }
  .loader.is-covering .loader-rows span{ transform:translateY(0%); }
</style>
</head>
<body>

  <div class="cursor-box"></div>

  <div class="loader" id="loader">
    <div class="loader-rows">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <header>
    <a class="home-link" href="../../index.html">[VUTHY CHEAM]</a>
    <nav>
      <a class="current" href="jewelry.html">Jewelry</a>
      <a href="../../index.html#projects" id="home-nav-link">Home</a>
    </nav>
  </header>

  <section class="intro">
    <video class="intro-video" autoplay muted loop playsinline>
        <source src="../../assets/videos/jewelry/jewelry-intro.mp4" type="video/mp4">
    </video>
    <div class="intro-overlay"></div>
    <div class="intro-content">
        <h1>Jewelry</h1>
        <p>From delicate everyday rings to statement necklaces, the designs blend classic elegance with a modern touch.</p>
        <a class="scroll-arrow" href="#pieces" aria-label="Scroll down">
          <span class="scroll-arrow-wrap">
            <span class="scroll-arrow-stack">
              <span class="arrow"><svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/></svg></span>
              <span class="arrow"><svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/></svg></span>
            </span>
          </span>
        </a>
    </div>
  </section>

  <nav class="category-nav">
    <button class="cat-filter active" data-filter="all">All</button>
    <button class="cat-filter" data-filter="earrings">Earrings</button>
    <button class="cat-filter" data-filter="rings">Rings</button>
    <button class="cat-filter" data-filter="bracelets">Bracelets</button>
    <button class="cat-filter" data-filter="necklaces">Necklaces</button>
    <button class="cat-filter" data-filter="glasses">Glasses</button>
    <button class="cat-filter" data-filter="hair-clips">Hair Clips</button>
  </nav>

  <div class="category" id="pieces">
    <section class="grid">

      <article class="piece" data-category="earrings">
        <div class="art art-photo" role="img" aria-label="Photo of the Drift Earrings">
          <img class="zoom-out-1" src="../../assets/images/jewelry/2026-07-16 01.33.53.jpg" alt="Drift Earrings">
        </div>
        <video class="art-video art-video-zoom" muted loop playsinline preload="none" aria-label="Video preview of the Drift Earrings">
          <source src="../../assets/videos/jewelry/1.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Drift Earrings</span></div>
      </article>

      <article class="piece" data-category="rings">
        <div class="art art-photo" role="img" aria-label="Photo of the Wave Ring">
          <img src="../../assets/images/jewelry/2.jpg" alt="Wave Ring">
        </div>
        <video class="art-video art-video-zoom2" muted loop playsinline preload="none" aria-label="Video preview of the Wave Ring">
          <source src="../../assets/videos/jewelry/2-.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Wave Ring</span></div>
      </article>

      <article class="piece" data-category="glasses">
        <div class="art art-photo" role="img" aria-label="Photo of the piece">
          <img class="zoom-out zoom-in-3" src="../../assets/images/jewelry/3.jpg" alt="Piece">
        </div>
        <video class="art-video art-video-zoom3" muted loop playsinline preload="none" aria-label="Video preview of the piece">
          <source src="../../assets/videos/jewelry/3.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Piece 03</span></div>
      </article>

      <article class="piece" data-category="bracelets">
        <div class="art art-photo" role="img" aria-label="Photo of the piece">
          <img class="zoom-out zoom-in-4" src="../../assets/images/jewelry/4.jpg" alt="Piece">
        </div>
        <video class="art-video art-video-zoom4" muted loop playsinline preload="none" aria-label="Video preview of the piece">
          <source src="../../assets/videos/jewelry/4.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Piece 04</span></div>
      </article>

      <article class="piece" data-category="hair-clips">
        <div class="art art-photo" role="img" aria-label="Photo of the piece">
          <img class="zoom-out zoom-in-5" src="../../assets/images/jewelry/5.jpg" alt="Piece">
        </div>
        <video class="art-video art-video-zoom5" muted loop playsinline preload="none" aria-label="Video preview of the piece">
          <source src="../../assets/videos/jewelry/5.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Piece 05</span></div>
      </article>

      <article class="piece" data-category="rings">
        <div class="art art-photo" role="img" aria-label="Photo of the piece">
          <img class="zoom-out zoom-in-6" src="../../assets/images/jewelry/6.jpg" alt="Piece">
        </div>
        <video class="art-video art-video-zoom6" muted loop playsinline preload="none" aria-label="Video preview of the piece">
          <source src="../../assets/videos/jewelry/6.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Piece 06</span></div>
      </article>

      <article class="piece" data-category="earrings">
        <div class="art art-photo" role="img" aria-label="Photo of the piece">
          <img class="zoom-out zoom-in-7" src="../../assets/images/jewelry/7.jpg" alt="Piece">
        </div>
        <video class="art-video art-video-zoom7" muted loop playsinline preload="none" aria-label="Video preview of the piece">
          <source src="../../assets/videos/jewelry/7.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Piece 07</span></div>
      </article>

      <article class="piece" data-category="rings">
        <div class="art art-photo" role="img" aria-label="Photo of the piece">
          <img class="zoom-out zoom-in-8" src="../../assets/images/jewelry/8.jpg" alt="Piece">
        </div>
        <video class="art-video art-video-zoom8" muted loop playsinline preload="none" aria-label="Video preview of the piece">
          <source src="../../assets/videos/jewelry/8.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Piece 08</span></div>
      </article>

      <article class="piece" data-category="necklaces">
        <div class="art art-photo" role="img" aria-label="Photo of the piece">
          <img class="zoom-out zoom-in-9" src="../../assets/images/jewelry/9.jpg" alt="Piece">
        </div>
        <video class="art-video art-video-zoom9" muted loop playsinline preload="none" aria-label="Video preview of the piece">
          <source src="../../assets/videos/jewelry/9.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Piece 09</span></div>
      </article>

    </section>
  </div>

  <footer>
    <button class="top-btn" aria-label="Back to top" onclick="window.scrollTo({top:0, behavior:'smooth'})">
      <span class="top-btn-wrap">
        <span class="top-btn-stack">
          <svg viewBox="0 0 24 24"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
        </span>
      </span>
    </button>
  </footer>

  <script>
    const categoryNav = document.querySelector('.category-nav');
    const filterButtons = document.querySelectorAll('.cat-filter');
    const pieces = document.querySelectorAll('.piece');

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.dataset.filter;

        pieces.forEach(p => {
          p.style.display = (target === 'all' || p.dataset.category === target) ? '' : 'none';
        });

        categoryNav.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    pieces.forEach(piece => {
      const video = piece.querySelector('.art-video');
      if (!video) return;
      piece.addEventListener('mouseenter', () => {
        video.currentTime = 0;
        video.play();
      });
      piece.addEventListener('mouseleave', () => {
        video.pause();
      });
    });
  </script>

  <script>
    (function(){
      const box = document.querySelector('.cursor-box');
      document.addEventListener('mousemove', (e) => {
        box.style.left = e.clientX + 'px';
        box.style.top = e.clientY + 'px';
      });
    })();
  </script>

  <script>
    (function(){
      const loader = document.getElementById('loader');
      const homeLink = document.getElementById('home-nav-link');

      homeLink.addEventListener('click', (e) => {
        e.preventDefault();
        loader.classList.add('is-active');
        requestAnimationFrame(() => loader.classList.add('is-covering'));
        setTimeout(() => { window.location.href = homeLink.href; }, 580);
      });
    })();
  </script>

</body>
</html>
