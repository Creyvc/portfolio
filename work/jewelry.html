<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewelry — Vuthy Cheam</title>
<style>
  :root{
    --paper:#FFFFFF; --ink:#17181C; --accent:#B4371F;
    --sans:ui-monospace, 'SF Mono', 'JetBrains Mono', 'IBM Plex Mono', Menlo, Consolas, monospace;
    --header-h: 3.25rem;
  }
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  html,body{ margin:0; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--sans);
    font-weight:300;
  }

  header{
    position:sticky; top:0; z-index:10;
    min-height:var(--header-h);
    display:flex; justify-content:space-between; align-items:center;
    padding:0.6rem 2rem;
    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(23,24,28,0.1);
  }
  header a{ color:var(--ink); text-decoration:none; }
  .home-link{
    font-family:var(--sans);
    font-weight:400;
    font-size:0.8rem;
    letter-spacing:0.02em;
  }
  nav{ display:flex; gap:2.5rem; font-size:0.7rem; font-weight:200; letter-spacing:0.03em; text-transform:uppercase; }
  nav a{ opacity:0.6; transition:opacity 0.15s; }
  nav a:hover, nav a.current{ opacity:1; }

.category-nav{
  position:sticky; top:var(--header-h); z-index:9;
  display:flex; gap:2rem;
  padding:1rem 2rem;
  background:var(--paper);
  border-bottom:1px solid rgba(23,24,28,0.1);
  overflow-x:auto;
  white-space:nowrap;
  scrollbar-width:none;
  scroll-margin-top:var(--header-h);
}
.category-nav::-webkit-scrollbar{ display:none; }
  .category-nav button{
    font-family:var(--sans);
    color:var(--ink);
    background:none;
    border:none;
    padding:0;
    cursor:pointer;
    text-decoration:none;
    font-size:0.8rem;
    font-weight:300;
    opacity:0.65;
    transition:opacity 0.15s;
  }
  .category-nav button:hover{ opacity:1; }
  .category-nav button.active{ opacity:1; font-weight:400; }

  .intro{
    position:relative;
    overflow:hidden;
    width:100%;
    min-height:calc(90vh + var(--header-h));
    margin-top:calc(-1 * var(--header-h));
    display:flex;
    align-items:flex-end;
    padding:5rem 2rem 3rem;
  }
  .intro-content{
    position:relative;
    z-index:2;
    max-width:760px;
  }
  .intro-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; z-index:0;
  }
  .intro-overlay{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
    z-index:1;
  }
  .intro-content{ position:relative; z-index:2; }
  .intro-content h1{
    color:#fff;
    font-weight:200;
    font-size:clamp(2.1rem, 5.5vw, 4.2rem);
    line-height:1.05;
    letter-spacing:-0.01em;
    margin:0;
  }
  .intro-content p{
    color:rgba(255,255,255,0.85);
    font-size:0.8rem;
    font-weight:200;
    line-height:1.7;
    max-width:56ch;
    margin:1.25rem 0 0;
  }
  .intro-content .scroll-arrow{
    display:inline-block;
    margin-top:1.5rem;
    font-size:1.5rem;
    line-height:1;
    color:#fff;
    text-decoration:none;
    opacity:0.8;
    transition:opacity 0.15s, transform 0.15s;
  }
  .intro-content .scroll-arrow:hover{ opacity:1; transform:translateY(3px); }
  
  .category{ padding-top:1.5rem; scroll-margin-top:8rem; }

  .grid{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:1px;
    background:rgba(23,24,28,0.1);
    border-top:1px solid rgba(23,24,28,0.1);
    border-bottom:1px solid rgba(23,24,28,0.1);
  }

  .piece{
    position:relative;
    background:var(--paper);
    aspect-ratio:4/5;
    display:flex; align-items:flex-end;
    overflow:hidden;
  }
  .piece .art{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    padding:1.5rem;
    background:rgba(23,24,28,0.03);
    transition:opacity 0.35s ease;
  }
  .piece .art-photo{ padding:0; background:var(--paper); }
  .piece .art-photo img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:45% 55%;
  }
  .piece .art-video-zoom{ transform:scale(1.6) translate(-18%, -8%); }
  .piece .art-video-zoom2{ transform:scale(1.2); }
  .piece .art-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 0.35s ease;
  }
  .piece::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.45));
    opacity:0;
    transition:opacity 0.35s ease;
    pointer-events:none;
  }
  .piece:hover .art{ opacity:0; }
  .piece:hover .art-video{ opacity:1; }
  .piece:hover::after{ opacity:1; }
  .piece .art svg{
    width:100%; height:100%;
    fill:none;
    stroke-width:1.2;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke:var(--ink);
  }
  .piece .caption{
    display:none;
    position:relative;
    padding:1.25rem;
    justify-content:space-between; width:100%;
    font-size:0.6rem;
    font-weight:300;
    letter-spacing:0.02em;
    color:var(--ink);
    transition:color 0.35s ease;
  }
  .piece:hover .caption{ color:#fff; }
  .piece .caption .year{ opacity:0.5; }

  footer{
    display:flex; justify-content:center;
    padding:3rem 2rem 4rem;
  }
  .top-btn{
    display:flex; align-items:center; justify-content:center;
    width:3rem; height:3rem;
    border-radius:50%;
    background:none;
    cursor:pointer;
    border:1px solid var(--ink);
    color:var(--ink);
    transition:background 0.15s, color 0.15s, border-color 0.15s;
  }
  .top-btn svg{
    width:1.1rem; height:1.1rem;
    stroke:currentColor;
    fill:none;
    stroke-width:1.5;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .top-btn:hover{ background:#14213D; border-color:#14213D; color:var(--paper); }

  .back-btn{
    position:fixed; left:2rem; top:calc(var(--header-h) + 1.25rem); z-index:20;
    display:flex; align-items:center; justify-content:center;
    width:3rem; height:3rem;
    border-radius:50%;
    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    cursor:pointer;
    border:1px solid var(--ink);
    color:var(--ink);
    text-decoration:none;
    transition:background 0.15s, color 0.15s, border-color 0.15s;
  }
  .back-btn svg{
    width:1.1rem; height:1.1rem;
    stroke:currentColor;
    fill:none;
    stroke-width:1.5;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .back-btn:hover{ background:var(--paper); border-color:transparent; color:var(--ink); }

  @media (max-width:600px){
    header{ padding:1.25rem 1.25rem; }
    nav{ gap:1rem; }
    .intro{ padding:3rem 1.25rem 2rem; }
    footer{ padding:2rem 1.25rem 3rem; }
  }
</style>
</head>
<body>

  <header>
    <a class="home-link" href="../index.html">[VUTHY CHEAM]</a>
    <nav>
      <a class="current" href="jewelry.html">Jewelry</a>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <a class="back-btn" href="../index.html#projects" aria-label="Go back" onclick="if(window.history.length>1){history.back();return false;}">
    <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
  </a>

  <section class="intro">
    <video class="intro-video" autoplay muted loop playsinline>
        <source src="videos/jewelry-intro.mp4" type="video/mp4">
    </video>
    <div class="intro-overlay"></div>
    <div class="intro-content">
        <h1>Jewelry</h1>
        <p>From delicate everyday rings to statement necklaces, the designs blend classic elegance with a modern touch.</p>
        <a class="scroll-arrow" href="#pieces" aria-label="Scroll down">↓</a>
    </div>
  </section>

  <nav class="category-nav">
    <button class="cat-filter active" data-filter="all">All</button>
    <button class="cat-filter" data-filter="earrings">Earrings</button>
    <button class="cat-filter" data-filter="rings">Rings</button>
    <button class="cat-filter" data-filter="bracelets">Bracelets</button>
    <button class="cat-filter" data-filter="necklaces">Necklaces</button>
    <button class="cat-filter" data-filter="glasses">Glasses</button>
    <button class="cat-filter" data-filter="hair-clips">Hair Clips</button>
  </nav>

  <div class="category" id="pieces">
    <section class="grid">

      <article class="piece" data-category="earrings">
        <div class="art art-photo" role="img" aria-label="Photo of the Drift Earrings">
          <img src="images/2026-07-16 01.33.53.jpg" alt="Drift Earrings">
        </div>
        <video class="art-video art-video-zoom" muted loop playsinline preload="none" aria-label="Video preview of the Drift Earrings">
          <source src="videos/1.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Drift Earrings</span></div>
      </article>

      <article class="piece" data-category="rings">
        <div class="art art-photo" role="img" aria-label="Photo of the Wave Ring">
          <img src="images/2.jpg" alt="Wave Ring">
        </div>
        <video class="art-video art-video-zoom2" muted loop playsinline preload="none" aria-label="Video preview of the Wave Ring">
          <source src="videos/2-.mp4" type="video/mp4">
        </video>
        <div class="caption"><span>Wave Ring</span></div>
      </article>

    </section>
  </div>

  <footer>
    <button class="top-btn" aria-label="Back to top" onclick="window.scrollTo({top:0, behavior:'smooth'})">
      <svg viewBox="0 0 24 24"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
    </button>
  </footer>

  <script>
    const categoryNav = document.querySelector('.category-nav');
    const filterButtons = document.querySelectorAll('.cat-filter');
    const pieces = document.querySelectorAll('.piece');

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.dataset.filter;

        pieces.forEach(p => {
          p.style.display = (target === 'all' || p.dataset.category === target) ? '' : 'none';
        });

        categoryNav.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    pieces.forEach(piece => {
      const video = piece.querySelector('.art-video');
      if (!video) return;
      piece.addEventListener('mouseenter', () => {
        video.currentTime = 0;
        video.play();
      });
      piece.addEventListener('mouseleave', () => {
        video.pause();
      });
    });
  </script>

</body>
</html>
