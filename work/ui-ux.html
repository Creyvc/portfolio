<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI/UX Designer — Vuthy Cheam</title>
<style>
  :root{
    --paper:#FFFFFF; --ink:#17181C; --accent:#B4371F;
    --sans:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --header-h: 4.75rem;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--sans);
  }
  header{
    position:sticky; top:0; z-index:10;
    min-height:var(--header-h);
    display:flex; justify-content:space-between; align-items:center;
    padding:1.5rem 2rem;
    background:var(--paper);
    border-bottom:1px solid rgba(23,24,28,0.1);
  }
  header a{ color:var(--ink); text-decoration:none; }
  .home-link{ font-family:var(--sans); font-weight:500; font-size:0.95rem; }
  nav{ display:flex; gap:1.5rem; font-size:0.8rem; letter-spacing:0.03em; text-transform:uppercase; }
  nav a{ opacity:0.6; transition:opacity 0.15s; }
  nav a:hover, nav a.current{ opacity:1; }

  .placeholder{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    min-height:calc(100vh - var(--header-h));
    padding:3rem 2rem;
  }
  .placeholder h1{
    font-weight:400;
    font-size:clamp(2.2rem, 6vw, 3.5rem);
    margin:0 0 1rem;
  }
  .placeholder p{
    opacity:0.65;
    font-size:1.05rem;
    max-width:48ch;
    margin:0;
  }
</style>
</head>
<body>

  <header>
    <a class="home-link" href="../index.html">Vuthy Cheam</a>
    <nav>
      <a class="current" href="ui-ux.html">UI/UX</a>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <section class="placeholder">
    <h1>UI/UX Design</h1>
    <p>Work coming soon.</p>
  </section>

</body>
</html>
